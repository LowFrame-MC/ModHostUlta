<!DOCTYPE html>
<html>
<head>
  <title>ModHostUlta</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: #0b1120;
      color: white;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 25px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    .logo { font-weight: bold; font-size: 18px; }

    .btn {
      background: #6366f1;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 10px;
    }

    .hidden { display: none; }

    .center {
      text-align: center;
      margin-top: 100px;
    }

    .title {
      font-size: 52px;
      font-weight: bold;
      letter-spacing: -1px;
    }

    .subtitle {
      color: #94a3b8;
      margin-top: 10px;
    }

    .section-btn {
      display: inline-block;
      margin: 10px;
      padding: 14px 26px;
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .section-btn:hover {
      border-color: #6366f1;
    }

    .search {
      width: 60%;
      margin: 20px auto;
      padding: 12px;
      border-radius: 8px;
      background: #020617;
      border: 1px solid #1e293b;
      color: white;
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #6366f1;
    }

    .summary {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 6px;
    }

    input, textarea, select {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 280px;
      border-radius: 8px;
      border: 1px solid #1e293b;
      background: #020617;
      color: white;
    }

    .page {
      padding: 30px;
      max-width: 800px;
      margin: auto;
    }

    a {
      color: #818cf8;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="logo">ModHostUlta</div>
  <div>
    <span id="publishBtn" class="btn hidden">Publish</span>
    <span id="loginBtn" class="btn">Login</span>
  </div>
</div>

<div id="home" class="center">
  <div class="title">ModHostUlta</div>
  <div class="subtitle">The ultimate way to find mods, resource packs, and shaders</div>

  <div>
    <div class="section-btn" data-cat="Mod">Mods</div>
    <div class="section-btn" data-cat="Resource Pack">Resource Packs</div>
    <div class="section-btn" data-cat="Shader">Shaders</div>
  </div>
</div>

<div id="browse" class="hidden">
  <input id="search" class="search" placeholder="Search...">
  <div class="grid" id="mods"></div>
</div>

<div id="modPage" class="hidden page"></div>

<div id="publish" class="hidden center">
  <h2>Publish</h2>

  <input id="name" placeholder="Name">
  <textarea id="summary" placeholder="Summary"></textarea>
  <textarea id="desc" placeholder="Description"></textarea>
  <input id="url" placeholder="GitHub / MediaFire URL">

  <select id="loader">
    <option>Fabric</option>
    <option>Forge</option>
    <option>NeoForge</option>
    <option>Sponge</option>
    <option>OptiFine</option>
    <option>Iris</option>
  </select>

  <button class="btn" id="submitBtn">Submit</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://dykpxbseaqtjpfznofgl.supabase.co',
  'sb_publishable_D_ne4_vfo-pshzHMsBg3Jw_d8K7F8lt'
)

const home = document.getElementById("home")
const browse = document.getElementById("browse")
const publish = document.getElementById("publish")
const modPage = document.getElementById("modPage")
const mods = document.getElementById("mods")
const searchInput = document.getElementById("search")

const loginBtn = document.getElementById("loginBtn")
const publishBtn = document.getElementById("publishBtn")

let category = null
let allMods = []

loginBtn.onclick = async () => {
  await supabase.auth.signInWithOAuth({ provider: 'discord' })
}

async function checkUser() {
  const { data } = await supabase.auth.getUser()
  if (data.user) {
    loginBtn.style.display = "none"
    publishBtn.classList.remove("hidden")
  }
}

document.querySelectorAll(".section-btn").forEach(btn => {
  btn.onclick = () => {
    category = btn.dataset.cat
    home.style.display = "none"
    browse.style.display = "block"
    publish.style.display = "none"
    modPage.style.display = "none"
    loadMods()
  }
})

publishBtn.onclick = () => {
  home.style.display = "none"
  browse.style.display = "none"
  publish.style.display = "block"
  modPage.style.display = "none"
}

document.getElementById("submitBtn").onclick = async () => {
  const { data } = await supabase.auth.getUser()
  const user = data.user
  if (!user) return alert("Login required")

  const url = document.getElementById("url").value

  if (!url.includes("github.com") && !url.includes("mediafire.com")) {
    return alert("Invalid link")
  }

  await supabase.from('mods').insert({
    name: name.value,
    summary: summary.value,
    description: desc.value,
    download_url: url,
    loader: loader.value,
    category,
    user_id: user.id
  })

  alert("Published")
}

async function loadMods() {
  const { data } = await supabase
    .from('mods')
    .select('*')
    .eq('category', category)
    .order('created_at', { ascending: false })

  allMods = data
  renderMods(data)
}

searchInput.oninput = () => {
  const val = searchInput.value.toLowerCase()
  renderMods(allMods.filter(m => m.name.toLowerCase().includes(val)))
}

function renderMods(data) {
  mods.innerHTML = ""
  data.forEach(mod => {
    const el = document.createElement("div")
    el.className = "card"
    el.innerHTML = `
      <h3>${mod.name}</h3>
      <div class="summary">${mod.summary || ""}</div>
    `
    el.onclick = () => openMod(mod)
    mods.appendChild(el)
  })
}

function openMod(mod) {
  browse.style.display = "none"
  modPage.style.display = "block"

  modPage.innerHTML = `
    <h1>${mod.name}</h1>
    <p>${mod.description || ""}</p>
    <p><b>Loader:</b> ${mod.loader}</p>
    <br>
    <a href="${mod.download_url}" target="_blank">Download</a>
  `
}

checkUser()
</script>

</body>
</html>
