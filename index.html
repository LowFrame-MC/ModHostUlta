<!DOCTYPE html>
<html>
<head>
  <title>ModHostUlta</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      padding: 15px;
    }

    .login-btn {
      background: #5865F2;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
    }

    .center {
      text-align: center;
      margin-top: 80px;
    }

    .title {
      font-size: 48px;
      font-weight: bold;
    }

    .subtitle {
      margin-top: 10px;
      color: #aaa;
    }

    .sections {
      margin-top: 40px;
    }

    .section-btn {
      display: inline-block;
      margin: 10px;
      padding: 15px 25px;
      background: #1a1a1a;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .section-btn:hover {
      background: #333;
    }

    .hidden {
      display: none;
    }

    .publish-box {
      margin: 20px;
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
    }

    input, select {
      margin: 5px 0;
      padding: 8px;
      width: 200px;
    }

    button {
      background: #5865F2;
      border: none;
      padding: 10px;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 12px;
    }

    .tag {
      font-size: 12px;
      background: #333;
      padding: 3px 6px;
      border-radius: 4px;
      margin-right: 5px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div id="loginBtn" class="login-btn" onclick="login()">Login with Discord</div>
</div>

<!-- HOME SCREEN -->
<div id="home" class="center">
  <div class="title">ModHostUlta</div>
  <div class="subtitle">
    The ultimate way to find mods, resource packs, and shaders, developed by LowFrame
  </div>

  <div class="sections">
    <div class="section-btn" onclick="openSection('Mod')">Mods</div>
    <div class="section-btn" onclick="openSection('Resource Pack')">Resource Packs</div>
    <div class="section-btn" onclick="openSection('Shader')">Shaders</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="publish-box">
    <h3>Publish</h3>

    <input id="name" placeholder="Name"><br>
    <input id="description" placeholder="Description"><br>
    <input id="url" placeholder="GitHub / MediaFire URL"><br>

    <select id="loader">
      <option>Fabric</option>
      <option>Forge</option>
      <option>NeoForge</option>
      <option>Sponge</option>
      <option>OptiFine</option>
      <option>Iris</option>
    </select>

    <input id="category" hidden>

    <br><br>
    <button onclick="publish()">Publish</button>
  </div>

  <div class="grid" id="mods"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://dykpxbseaqtjpfznofgl.supabase.co',
  'sb_publishable_D_ne4_vfo-pshzHMsBg3Jw_d8K7F8lt'
)

let currentCategory = null

// 🔐 Login
window.login = async () => {
  await supabase.auth.signInWithOAuth({
    provider: 'discord'
  })
}

// 🧠 Check login state
async function checkUser() {
  const { data } = await supabase.auth.getUser()
  const user = data.user

  if (user) {
    document.getElementById("loginBtn").style.display = "none"
  }
}

// 📂 Open section
window.openSection = (category) => {
  currentCategory = category
  document.getElementById("category").value = category

  document.getElementById("home").style.display = "none"
  document.getElementById("app").style.display = "block"

  loadMods()
}

// 📦 Publish
window.publish = async () => {
  const { data } = await supabase.auth.getUser()
  const user = data.user

  if (!user) {
    alert("You must be logged in to publish")
    return
  }

  const name = document.getElementById('name').value
  const description = document.getElementById('description').value
  const url = document.getElementById('url').value
  const loader = document.getElementById('loader').value

  if (!url.includes("github.com") && !url.includes("mediafire.com")) {
    alert("Only GitHub or MediaFire links allowed")
    return
  }

  await supabase.from('mods').insert({
    name,
    description,
    download_url: url,
    loader,
    category: currentCategory,
    user_id: user.id
  })

  alert("Published!")
  loadMods()
}

// 📥 Load mods
async function loadMods() {
  const { data } = await supabase
    .from('mods')
    .select('*')
    .eq('category', currentCategory)
    .order('created_at', { ascending: false })

  const container = document.getElementById('mods')
  container.innerHTML = ""

  data.forEach(mod => {
    container.innerHTML += `
      <div class="card">
        <h3>${mod.name}</h3>
        <p>${mod.description || ""}</p>

        <div>
          <span class="tag">${mod.loader}</span>
          <span class="tag">${mod.category}</span>
        </div>

        <br>
        <a href="${mod.download_url}" target="_blank">Download</a>
      </div>
    `
  })
}

checkUser()
</script>

</body>
</html>
