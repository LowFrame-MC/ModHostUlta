<!DOCTYPE html>
<html>
<head>
  <title>ModHostUlta</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 25px;
      background: rgba(0,0,0,0.4);
    }

    .btn {
      background: #6366f1;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
    }

    .hidden { display: none; }

    .center {
      text-align: center;
      margin-top: 80px;
    }

    .title {
      font-size: 50px;
      background: linear-gradient(90deg,#818cf8,#22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section-btn {
      display: inline-block;
      padding: 15px 25px;
      margin: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      cursor: pointer;
    }

    .search {
      width: 60%;
      margin: 20px auto;
      padding: 12px;
      border-radius: 10px;
      background: #020617;
      color: white;
      border: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill,minmax(240px,1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      padding: 15px;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .summary {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 8px;
    }

    input, textarea, select {
      display: block;
      margin: 10px auto;
      padding: 10px;
      width: 260px;
      border-radius: 8px;
      border: none;
      background: #020617;
      color: white;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div>ModHostUlta</div>
  <div>
    <span id="publishBtn" class="btn hidden" onclick="showPublish()">Publish</span>
    <span id="loginBtn" class="btn" onclick="login()">Login</span>
  </div>
</div>

<!-- HOME -->
<div id="home" class="center">
  <div class="title">ModHostUlta</div>
  <p>The ultimate way to find mods, resource packs, and shaders</p>

  <div>
    <div class="section-btn" onclick="browse('Mod')">Mods</div>
    <div class="section-btn" onclick="browse('Resource Pack')">Resource Packs</div>
    <div class="section-btn" onclick="browse('Shader')">Shaders</div>
  </div>
</div>

<!-- BROWSE -->
<div id="browse" class="hidden">
  <input id="search" class="search" placeholder="Search..." oninput="loadMods()">
  <div class="grid" id="mods"></div>
</div>

<!-- PUBLISH -->
<div id="publish" class="hidden center">
  <h2>Publish</h2>

  <input id="name" placeholder="Name">
  <textarea id="summary" placeholder="Short summary (shown on card)"></textarea>
  <textarea id="desc" placeholder="Full description"></textarea>
  <input id="url" placeholder="GitHub / MediaFire URL">

  <select id="loader">
    <option>Fabric</option>
    <option>Forge</option>
    <option>NeoForge</option>
    <option>Sponge</option>
    <option>OptiFine</option>
    <option>Iris</option>
  </select>

  <button class="btn" onclick="publishMod()">Submit</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://dykpxbseaqtjpfznofgl.supabase.co',
  'sb_publishable_D_ne4_vfo-pshzHMsBg3Jw_d8K7F8lt'
)

let category = null

window.login = async () => {
  await supabase.auth.signInWithOAuth({ provider: 'discord' })
}

async function checkUser() {
  const { data } = await supabase.auth.getUser()
  if (data.user) {
    loginBtn.style.display = "none"
    publishBtn.style.display = "inline-block"
  }
}

window.browse = (cat) => {
  category = cat
  home.style.display = "none"
  browse.style.display = "block"
  publish.style.display = "none"
  loadMods()
}

window.showPublish = () => {
  browse.style.display = "none"
  publish.style.display = "block"
}

window.publishMod = async () => {
  const { data } = await supabase.auth.getUser()
  const user = data.user
  if (!user) return alert("Login required")

  const url = document.getElementById("url").value

  if (!url.includes("github.com") && !url.includes("mediafire.com")) {
    return alert("Only GitHub or MediaFire links allowed")
  }

  await supabase.from('mods').insert({
    name: name.value,
    summary: summary.value,
    description: desc.value,
    download_url: url,
    loader: loader.value,
    category,
    user_id: user.id
  })

  alert("Published!")
}

window.loadMods = async () => {
  const search = document.getElementById("search").value.toLowerCase()

  const { data } = await supabase
    .from('mods')
    .select('*')
    .eq('category', category)
    .order('created_at', { ascending: false })

  mods.innerHTML = ""

  data
    .filter(m => m.name.toLowerCase().includes(search))
    .forEach(mod => {
      mods.innerHTML += `
        <div class="card">
          <h3>${mod.name}</h3>
          <div class="summary">${mod.summary || ""}</div>
        </div>
      `
    })
}

checkUser()
</script>

</body>
</html>
